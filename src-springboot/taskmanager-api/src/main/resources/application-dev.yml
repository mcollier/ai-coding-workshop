# Task Manager API - Development Environment Configuration
# Overrides and additions to application.yml for local development

spring:
  # Development Database - H2 in-memory for easy setup (no external DB required)
  # Use PostgreSQL mode for compatibility with production
  datasource:
    url: jdbc:h2:mem:taskmanager_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
    
  # Enable H2 Console for database inspection (http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console
    
  # JPA Configuration for Development
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # Auto-create schema on startup, drop on shutdown
    show-sql: true           # Show SQL in console for debugging
    properties:
      hibernate:
        format_sql: true
        
# Server Configuration
server:
  port: 8080
  error:
    include-stacktrace: always  # Include full stack traces in development
    
# Logging Configuration - More verbose for development
logging:
  level:
    root: INFO
    com.example.taskmanager: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}"
    
# Actuator - Expose all endpoints in development
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
