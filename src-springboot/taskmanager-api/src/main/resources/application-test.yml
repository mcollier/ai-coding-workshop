# Task Manager API - Test Environment Configuration
# Configuration for integration tests

spring:
  # Test Database - H2 in-memory with PostgreSQL compatibility
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
    
  # JPA Configuration for Tests
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # Recreate schema for each test run
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        
# Server Configuration for Tests
server:
  port: 0  # Random port for tests
  
# Logging Configuration - Minimal for tests
logging:
  level:
    root: WARN
    com.example.taskmanager: INFO
    org.springframework: WARN
    org.hibernate: WARN
    
# Actuator - Disabled in tests
management:
  endpoints:
    enabled-by-default: false
